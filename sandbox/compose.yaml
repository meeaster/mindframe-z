services:
  agent-vault:
    build:
      context: /home/mark/references/agent-vault
      dockerfile: Dockerfile
    image: local-ai-dev-sandbox-agent-vault:latest
    command:
      - server
      - --host
      - 0.0.0.0
      - --port
      - "14321"
      - --mitm-port
      - "14322"
    environment:
      AGENT_VAULT_ADDR: http://127.0.0.1:${AGENT_VAULT_API_PORT:-14321}
      AGENT_VAULT_MASTER_PASSWORD: ${AGENT_VAULT_MASTER_PASSWORD:?Set AGENT_VAULT_MASTER_PASSWORD in .env}
    ports:
      - "127.0.0.1:${AGENT_VAULT_API_PORT:-14321}:14321"
      - "127.0.0.1:${AGENT_VAULT_MITM_PORT:-14322}:14322"
    volumes:
      - agent-vault-data:/data

  bedrock-sigv4-proxy:
    build:
      context: .
      dockerfile: proxy/bedrock-sigv4-proxy/Dockerfile
    command:
      - --name
      - bedrock
      - --host
      - bedrock-runtime.${BEDROCK_AWS_REGION:-us-west-2}.amazonaws.com
    environment:
      AWS_PROFILE: ${AWS_PROFILE:-bedrock-sandbox}
      AWS_REGION: ${BEDROCK_AWS_REGION:-us-west-2}
      AWS_SDK_LOAD_CONFIG: "1"
      HOME: /home/mark
      UV_PROJECT_ENVIRONMENT: /tmp/credential-process-venv
    ports:
      - "127.0.0.1:${BEDROCK_SIGV4_PROXY_PORT:-8080}:8080"
    volumes:
      - ${HOME}/.aws:/host-aws:ro
      - bedrock-proxy-aws:/home/mark/.aws
      - ./proxy/bedrock-sigv4-proxy/claude-settings.json:/home/mark/.claude/settings.json:ro
      - /home/mark/work/claude-code-with-amazon-bedrock-distribution:/home/mark/work/claude-code-with-amazon-bedrock-distribution:ro
      - bedrock-credential-logs:/home/mark/work/claude-code-with-amazon-bedrock-distribution/logs
    extra_hosts:
      - host.docker.internal:host-gateway

volumes:
  agent-vault-data:
  bedrock-proxy-aws:
  bedrock-credential-logs:
