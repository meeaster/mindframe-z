name: work
extends: base
description: Work AI setup using OpenAI models.
mcp:
  aws-knowledge:
    enabled: true
  jira:
    enabled: true
  confluence:
    enabled: true
  datadog:
    enabled: true
opencode:
  config:
    agent:
      explore:
        model: openai/gpt-5.4-mini
        reasoningEffort: medium
claude:
  settings:
    includeGitInstructions: false
