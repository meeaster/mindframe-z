name: work
extends: base
description: Work AI setup using OpenAI models.
agents: [opencode, claude-code]
skills:
  confluence-writer:
    enabled: true
  jira-writer:
    enabled: true
  pr-writer:
    enabled: true
  visual-explainer:
    enabled: false
references:
  - datadog-agent
  - integrations-core
  - datadog-documentation
  - pup
mcp:
  aws-knowledge:
    enabled: false
  jira:
    enabled: false
  confluence:
    enabled: false
  datadog:
    enabled: false
opencode:
  config:
    provider:
      datadog:
        name: Datadog AI
        npm: "@ai-sdk/openai-compatible"
        models:
          datadog-ai:
            name: Datadog AI Agent
        options:
          baseURL: http://127.0.0.1:9099
    permission:
      bash:
        "*ARTIFACTORY_TOKEN*": deny
        "*UV_INDEX_ARTIFACTORY_PASSWORD*": deny
        "aws ec2 describe-instances *": allow
        "git add*": allow
        "pnpm *": allow
        "npm *": allow
        "git status --short*": allow
        "git diff*": allow
        "git log*": allow
        "git branch --show-current": allow
        "git branch -vv": allow
        "git remote -v": allow
        "git ls-files --others --exclude-standard": allow
        "git rev-parse*": allow
        "mkdir*": allow
        "ls": allow
        "ls *": allow
        "jq *": allow
        "rg *": allow
        "uv lock*": allow
        "pytest *": allow
        "actionlint *": allow
        "zizmor *": allow
        "gh repo *": allow
        "gh run list*": allow
        "gh pr view *": allow
        "gh pr diff *": allow
        "openspec *": allow
        "opencode db *": allow
        "mise *": allow
    agent:
      explore:
        model: github-copilot/gpt-5.4-mini
        reasoningEffort: high
      compaction:
        model: github-copilot/gpt-5.4-mini
        reasoningEffort: high
claude:
  settings:
    includeGitInstructions: false
