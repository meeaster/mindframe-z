name: work
extends: base
description: Work AI setup using OpenAI models.
agents: [opencode, claude-code]
skills:
  jira-writer:
    enabled: true
  pr-writer:
    enabled: true
  visual-explainer:
    enabled: false
references:
  - datadog-agent
  - integrations-core
  - datadog-documentation
  - pup
mcp:
  aws-knowledge:
    enabled: false
  jira:
    enabled: false
  confluence:
    enabled: false
  datadog:
    enabled: false
opencode:
  config:
    provider:
      datadog:
        name: Datadog AI
        npm: "@ai-sdk/openai-compatible"
        models:
          datadog-ai:
            name: Datadog AI Agent
        options:
          baseURL: http://127.0.0.1:9099
    agent:
      explore:
        model: github-copilot/gpt-5.4-mini
        reasoningEffort: high
      compaction:
        model: github-copilot/gpt-5.4-mini
        reasoningEffort: high
claude:
  settings:
    includeGitInstructions: false
