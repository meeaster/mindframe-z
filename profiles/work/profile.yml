name: work
extends: base
description: Work AI setup using OpenAI models.
skills:
  jira-writer: [all]
  pr-writer: [all]
  visual-explainer: [all]
references:
  - datadog-agent
mcp:
  aws-knowledge:
    targets: [opencode, claude-code]
    enabled: false
  jira:
    targets: [opencode, claude-code]
    enabled: false
  confluence:
    targets: [opencode, claude-code]
    enabled: false
  datadog:
    targets: [opencode, claude-code]
    enabled: false
opencode:
  config:
    agent:
      explore:
        model: github-copilot/gpt-5.4-mini
        reasoningEffort: medium
claude:
  settings:
    includeGitInstructions: false
