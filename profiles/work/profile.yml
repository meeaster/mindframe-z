name: work
extends: base
description: Work AI setup using OpenAI models.
skills:
  - jira-writer
  - pr-writer
  - visual-explainer
references:
  - datadog-agent
mcp:
  aws-knowledge:
    enabled: false
  jira:
    enabled: false
  confluence:
    enabled: false
  datadog:
    enabled: false
opencode:
  config:
    agent:
      explore:
        model: github-copilot/gpt-5.4-mini
        reasoningEffort: medium
claude:
  settings:
    includeGitInstructions: false
