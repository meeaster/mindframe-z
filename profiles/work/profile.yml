name: work
extends: base
description: Work AI setup using Bedrock-backed models.
agents: [opencode, claude-code, codex]
skills:
  confluence-writer:
    agents: { opencode: true, claude-code: true, codex: true }
  jira-writer:
    agents: { opencode: true, claude-code: true, codex: true }
  visual-explainer:
    agents: { opencode: false, claude-code: false, codex: false }
references:
  - datadog-agent
  - integrations-core
  - datadog-documentation
  - pup
mcp:
  aws-knowledge:
    agents: { opencode: false, claude-code: true, codex: false }
  jira:
    agents: { opencode: false, claude-code: true, codex: false }
  confluence:
    agents: { opencode: false, claude-code: true, codex: false }
  datadog:
    agents: { opencode: false, claude-code: true, codex: false }
  forge:
    agents: { opencode: false, claude-code: true, codex: false }
thread:
  # Thread dispatch authenticates to Bedrock the same way interactive Claude
  # Code does: the runner reads ~/.claude/settings.json for the AWS profile,
  # region, and awsAuthRefresh binary, refreshes creds on the host before
  # launch, and mounts a scoped, short-lived credential file into the container.
  credentials: bedrock
  destinations:
    - name: personal
      remote: git@github.com:meeaster/threads.git
      default: false
  defaults:
    discover: claude-code:us.anthropic.claude-haiku-4-5-20251001-v1:0@low
    gather: claude-code:us.anthropic.claude-haiku-4-5-20251001-v1:0@low
    synthesize: claude-code:us.anthropic.claude-sonnet-5@low
    digest: claude-code:us.anthropic.claude-sonnet-5@high
opencode:
  config:
    provider:
      datadog:
        name: Datadog AI
        npm: "@ai-sdk/openai-compatible"
        models:
          datadog-ai:
            name: Datadog AI Agent
        options:
          baseURL: http://127.0.0.1:9099
    permission:
      bash:
        "*": allow
        "*ARTIFACTORY_TOKEN*": deny
        "*UV_INDEX_ARTIFACTORY_PASSWORD*": deny
        "aws ec2 describe-instances *": allow
        "git add*": allow
        "pnpm *": allow
        "npm *": allow
        "git status --short*": allow
        "git diff*": allow
        "git log*": allow
        "git branch --show-current": allow
        "git branch -vv": allow
        "git remote -v": allow
        "git ls-files --others --exclude-standard": allow
        "git rev-parse*": allow
        "mkdir*": allow
        "ls": allow
        "ls *": allow
        "jq *": allow
        "rg *": allow
        "uv lock*": allow
        "pytest *": allow
        "actionlint *": allow
        "zizmor *": allow
        "gh repo *": allow
        "gh run list*": allow
        "gh pr view *": allow
        "gh pr diff *": allow
        "openspec *": allow
        "opencode db *": allow
        "mise *": allow
    agent:
      explore:
        model: github-copilot/gpt-5.4-mini
        variant: high
      compaction:
        model: github-copilot/gpt-5.4-mini
        variant: high
      research:
        model: github-copilot/gpt-5.4-mini
        variant: high
codex:
  plugins:
    "teams@openai-curated":
      enabled: true
    "outlook-calendar@openai-curated":
      enabled: true
    "outlook-email@openai-curated":
      enabled: true
    "sharepoint@openai-curated":
      enabled: true
claude:
  settings:
    includeGitInstructions: false
    permissions:
      defaultMode: acceptEdits
      allow:
        - "Bash(*)"
        - "WebFetch(domain:*)"
        - "mcp__context7__*"
        - "mcp__qmd__*"
        - "mcp__fff__*"
        - "mcp__deepwiki__*"
        - "mcp__openai-docs__*"
        - "mcp__exa__*"
        - "mcp__aws-knowledge__*"
        - "mcp__jira__*"
        - "mcp__confluence__*"
        - "mcp__datadog__*"
      deny:
        - "Bash(rm -rf *)"
        - "Bash(rm -rf)"
        - "Bash(git push --force*)"
        - "Bash(git push -f*)"
        - "Bash(git reset --hard*)"
        - "Bash(git checkout -- *)"
        - "Bash(git clean -f*)"
        - "Bash(cat ~/.aws/*)"
        - "Bash(cat ~/.ssh/*)"
        - "Bash(env)"
        - "Bash(printenv*)"
        - "Read(//home/mark/.aws/**)"
        - "Read(//home/mark/.ssh/**)"
