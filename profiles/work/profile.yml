name: work
extends: base
description: Work AI setup using OpenAI models.
agents: [opencode, claude-code]
skills:
  jira-writer:
    enabled: true
  pr-writer:
    enabled: true
  visual-explainer:
    enabled: false
references:
  - datadog-agent
  - integrations-core
  - datadog-documentation
mcp:
  aws-knowledge:
    enabled: false
  jira:
    enabled: false
  confluence:
    enabled: false
  datadog:
    enabled: false
opencode:
  config:
    agent:
      explore:
        model: github-copilot/gpt-5.4-mini
        reasoningEffort: medium
      compaction:
        model: github-copilot/gpt-5.4-mini
claude:
  settings:
    includeGitInstructions: false
