[tools]
node = "24"
bun = "1.3"
python = "3.12"
rust = "latest"
aws-cli = "latest"
aws-sam-cli = "latest"
terraform = "1.14"
gh = "latest"
jq = "latest"
pipx = "latest"
pre-commit = "latest"
ripgrep = "latest"
rtk = "latest"
uv = "latest"
pnpm = "11"
actionlint = "1"
zizmor = "1"
shellcheck = "0"
shfmt = "3"
tflint = "0"
yamllint = "1"
"github:modem-dev/hunk" = "latest"
"npm:aws-cdk" = "latest"
"npm:sfw" = "latest"
"npm:@tobilu/qmd" = "latest"
"npm:@fission-ai/openspec" = "latest"
"github:Infisical/agent-vault" = "latest"

[settings]
minimum_release_age = "3d"

[tools."github:dmtrKovalenko/fff"]
version = "latest"
asset_pattern = "fff-mcp-x86_64-unknown-linux-gnu"
bin = "fff-mcp"

[env]
OPENCODE_ENABLE_EXA = "1"
OPENCODE_EXPERIMENTAL_OXFMT = "1"
OPENCODE_EXPERIMENTAL_SCOUT = "0"
OPENCODE_EXPERIMENTAL_WORKSPACES = "1"
OPENCODE_EXPERIMENTAL_CUSTOMIZE_SKILL = "true"
