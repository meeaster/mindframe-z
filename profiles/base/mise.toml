[tools]
node = "24"
bun = "1.3"
python = "3.14"
rust = "1"
aws-cli = "2"
aws-sam-cli = "1"
terraform = "1.15"
gh = "2"
jq = "1"
pipx = "1"
pre-commit = "4"
ripgrep = "15"
rtk = "0"
uv = "0"
pnpm = "11"
actionlint = "1"
zizmor = "1"
shellcheck = "0"
sqlite = "3"
shfmt = "3"
tflint = "0"
yamllint = "1"
"npm:ccstatusline" = "2.2.22"
# "npm:hunkdiff" = "0"
"npm:aws-cdk" = "2"
"npm:sfw" = "2"
"npm:@tobilu/qmd" = "2"
"npm:@fission-ai/openspec" = "1"
"npm:skills" = "1"
"github:Infisical/agent-vault" = "0"
"github:kitlangton/ghui" = "0"
"npm:agent-browser" = "0"

[settings]
minimum_release_age = "3d"

[tools."github:dmtrKovalenko/fff"]
version = "0"
asset_pattern = "fff-mcp-x86_64-unknown-linux-gnu"
bin = "fff-mcp"

[env]
OPENCODE_ENABLE_EXA = "1"
OPENCODE_EXPERIMENTAL_OXFMT = "1"
OPENCODE_EXPERIMENTAL_SCOUT = "0"
OPENCODE_EXPERIMENTAL_WORKSPACES = "1"
OPENCODE_EXPERIMENTAL_CUSTOMIZE_SKILL = "true"
OPENCODE_ADVISOR_MODEL = "openai/gpt-5.5@high"
