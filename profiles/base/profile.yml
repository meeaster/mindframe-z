name: base
description: Shared base config for all profiles.
agents:
  - opencode
  - claude-code
instructions:
  - shared/AGENTS.global.md
references:
  - opencode
  - openspec
  - mise
  - hunk
  - vercel-skills
  - agent-vault
skills:
  hunk-review:
    enabled: false
  impeccable:
    enabled: false
  mise:
    enabled: true
  opencode-db:
    enabled: false
    targets: [opencode]
  openspec-apply-change:
    enabled: true
    toggleable: false
  openspec-archive-change:
    enabled: true
    toggleable: false
  openspec-explore:
    enabled: true
    toggleable: false
  openspec-propose:
    enabled: true
    toggleable: false
  openspec-sync-specs:
    enabled: true
    toggleable: false
  skill-writer:
    enabled: false
  gpt-model-selection:
    enabled: false
  qmd:
    enabled: false
  openai-docs:
    enabled: false
  claude-code-docs:
    enabled: false
    targets: [opencode]
mcp:
  context7:
    enabled: true
  qmd:
    enabled: false
  fff:
    enabled: true
  deepwiki:
    enabled: true
  openai-docs:
    enabled: false
opencode:
  config:
    lsp: true
    reference:
      opencode: https://github.com/anomalyco/opencode
  plugins:
    - mindframe-z-example
  commands:
    - opsx-archive
    - opsx-apply
    - opsx-explore
    - opsx-propose
    - rmslop
