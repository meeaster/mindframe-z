name: base
description: Shared base config for all profiles.
instructions:
  - shared/AGENTS.global.md
references:
  - opencode
  - openspec
  - mise
  - hunk
  - vercel-skills
  - agent-vault
skills:
  hunk-review:
    enabled: false
  thermo-nuclear-code-quality-review:
    enabled: true
  impeccable:
    enabled: false
  mise:
    enabled: false
  opencode-db:
    enabled: true
    targets: [opencode]
  openspec-apply-change:
    enabled: true
    toggleable: false
  openspec-archive-change:
    enabled: true
    toggleable: false
  openspec-explore:
    enabled: true
    toggleable: false
  openspec-propose:
    enabled: true
    toggleable: false
  openspec-sync-specs:
    enabled: true
    toggleable: false
  skill-writer:
    enabled: true
  grill-with-docs:
    enabled: false
  improve-codebase-architecture:
    enabled: false
  gpt-model-selection:
    enabled: false
  qmd:
    enabled: false
  openai-docs:
    enabled: false
  claude-code-docs:
    enabled: false
    targets: [opencode]
mcp:
  context7:
    enabled: true
  qmd:
    enabled: false
  fff:
    enabled: true
  deepwiki:
    enabled: true
  openai-docs:
    enabled: false
opencode:
  config:
    lsp: true
    reference:
      opencode: https://github.com/anomalyco/opencode
    permission:
      read:
        "~/.aws/**": deny
        "~/.dotfiles/secrets.zsh": deny
      bash:
        "*": ask
        "aws ec2 describe-instances *": allow
        "git add*": allow
        "pnpm *": allow
        "npm *": allow
        "git status --short*": allow
        "git diff*": allow
        "git log*": allow
        "git branch --show-current": allow
        "git branch -vv": allow
        "git remote -v": allow
        "git ls-files --others --exclude-standard": allow
        "git rev-parse*": allow
        "mkdir*": allow
        "ls": allow
        "ls *": allow
        "jq *": allow
        "rg *": allow
        "uv lock*": allow
        "pytest *": allow
        "actionlint *": allow
        "zizmor *": allow
        "gh repo *": allow
        "gh run list*": allow
        "openspec *": allow
        "opencode db *": allow
        "mise *": allow
        "*/.aws/*": deny
        "*/.dotfiles/secrets.zsh": deny
        "*ARTIFACTORY_TOKEN*": deny
        "*UV_INDEX_ARTIFACTORY_PASSWORD*": deny
        "*DD_API_KEY*": deny
        "*DD_APP_KEY*": deny
        "*EXA_API_KEY*": deny
        "*GITHUB_TOKEN*": deny
        "*GH_TOKEN*": deny
  plugins:
    - mindframe-z-example
  commands:
    - opsx-archive
    - opsx-apply
    - opsx-explore
    - opsx-propose
    - rmslop
extra_folders:
  - path: ~/.mindframe-z
    description: mindframe-z configuration and generated indexes — needed when looking up references, reading machine config, or inspecting extra folder permissions
  - path: ~/.agent/diagrams
    description: Agent diagram files and exports — needed for reviewing and updating local workflow diagrams
