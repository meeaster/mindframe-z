name: base
description: Shared base config for all profiles.
instructions:
  - shared/AGENTS.global.md
references:
  - opencode
  - openspec
  - mise
  - hunk
  - vercel-skills
  - agent-vault
  - ponytail
  - ccstatusline
  - just-bash
  - executor
  - mattpocock-skills
  - dd-apm-test-agent
  - sideshow
thread:
  destinations:
    - name: testing
      remote: git@github.com:meeaster/thread-testing.git
  defaults:
    synthesize: claude-code:sonnet@max
    gather: claude-code:haiku@low
    discover: claude-code:haiku@low
    session_sources:
      - claude-code
      - opencode
skills:
  agent-browser:
    enabled: true
  hunk-review:
    enabled: false
  thermo-nuclear-code-quality-review:
    enabled: true
  adversarial-code-review:
    enabled: true
  quality-garden:
    enabled: true
  impeccable:
    enabled: false
  mise:
    enabled: false
  opencode-sessions:
    enabled: true
  threads:
    enabled: true
  openspec-apply-change:
    enabled: true
    toggleable: false
  openspec-archive-change:
    enabled: true
    toggleable: false
  openspec-explore:
    enabled: true
    toggleable: false
  openspec-propose:
    enabled: true
    toggleable: false
  openspec-sync-specs:
    enabled: true
    toggleable: false
  openspec-verify-change:
    enabled: true
    toggleable: false
  skill-writer:
    enabled: false
  writing-great-skills:
    enabled: true
  skill-patterns:
    enabled: true
  audit-ai-writing:
    enabled: true
  grill-with-docs:
    enabled: false
  grill-me:
    enabled: false
  grilling:
    enabled: false
  improve-codebase-architecture:
    enabled: false
  gpt-model-selection:
    enabled: false
  domain-modeling:
    enabled: false
  qmd:
    enabled: false
  openai-docs:
    enabled: false
  improve:
    enabled: true
  claude-code-docs:
    enabled: true
  claude-code-sessions:
    enabled: true
  build-mcp-server:
    enabled: true
  xlsx:
    enabled: true
  prototype:
    enabled: true
  handoff:
    enabled: true
mcp:
  context7:
    enabled: true
  qmd:
    enabled: false
  fff:
    enabled: true
  deepwiki:
    enabled: true
  openai-docs:
    enabled: false
  exa:
    enabled: true
    targets: [claude-code]
opencode:
  config:
    lsp: true
    tools:
      websearch: true
    reference:
      opencode: https://github.com/anomalyco/opencode
    permission:
      read:
        "~/.aws/**": deny
      bash:
        "*": ask
        "*/.aws/*": deny
        "*EXA_API_KEY*": deny
        "*GITHUB_TOKEN*": deny
        "*GH_TOKEN*": deny
  plugins:
    - agent-task
    - mindframe-z-example
  commands:
    - apply-spec
    - rmslop
  agents:
    - research
claude:
  settings:
    statusLine:
      type: command
      command: ccstatusline
      padding: 0
      refreshInterval: 10

extra_folders:
  - path: ~/.mindframe-z
    description: mindframe-z configuration and generated indexes — needed when looking up references, reading machine config, or inspecting extra folder permissions
  - path: ~/.agent/diagrams
    description: Agent diagram files and exports — needed for reviewing and updating local workflow diagrams
  - path: ~/.claude/threads
    description: Thread-log archives — per-thread session extractions, state digests, and logs for multi-session work; needed when resuming or reviewing past threads
