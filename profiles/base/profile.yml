name: base
description: Shared base config for all profiles.
instructions:
  - shared/AGENTS.global.md
references:
  - opencode
  - openspec
  - mise
  - hunk
  - vercel-skills
  - agent-vault
  - ponytail
  - just-bash
  - executor
skills:
  hunk-review:
    enabled: false
  thermo-nuclear-code-quality-review:
    enabled: true
  impeccable:
    enabled: false
  mise:
    enabled: false
  opencode-db:
    enabled: true
  pdf:
    enabled: true
  openspec-apply-change:
    enabled: true
    toggleable: false
  openspec-archive-change:
    enabled: true
    toggleable: false
  openspec-explore:
    enabled: true
    toggleable: false
  openspec-propose:
    enabled: true
    toggleable: false
  openspec-sync-specs:
    enabled: true
    toggleable: false
  openspec-verify-change:
    enabled: true
    toggleable: false
  skill-writer:
    enabled: true
  grill-with-docs:
    enabled: false
  improve-codebase-architecture:
    enabled: false
  gpt-model-selection:
    enabled: false
  qmd:
    enabled: false
  openai-docs:
    enabled: false
  improve:
    enabled: true
  claude-code-docs:
    enabled: true
  build-mcp-server:
    enabled: true
mcp:
  context7:
    enabled: true
  qmd:
    enabled: false
  fff:
    enabled: true
  deepwiki:
    enabled: true
  openai-docs:
    enabled: false
  exa:
    enabled: true
    targets: [claude-code]
opencode:
  config:
    lsp: true
    tools:
      websearch: true
    reference:
      opencode: https://github.com/anomalyco/opencode
    permission:
      read:
        "~/.aws/**": deny
      bash:
        "*": ask
        "*/.aws/*": deny
        "*EXA_API_KEY*": deny
        "*GITHUB_TOKEN*": deny
        "*GH_TOKEN*": deny
  plugins:
    - agent-task
    - mindframe-z-example
  commands:
    - rmslop
extra_folders:
  - path: ~/.mindframe-z
    description: mindframe-z configuration and generated indexes — needed when looking up references, reading machine config, or inspecting extra folder permissions
  - path: ~/.agent/diagrams
    description: Agent diagram files and exports — needed for reviewing and updating local workflow diagrams
