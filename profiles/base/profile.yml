name: base
description: Shared base config for all profiles.
targets:
  - opencode
  - claude-code
instructions:
  - shared/AGENTS.global.md
references:
  - opencode
  - openspec
  - mise
  - hunk
  - vercel-skills
  - agent-vault
skills:
  hunk-review: [all]
  impeccable: [all]
  mise: [all]
  opencode-db: [opencode]
  openspec-apply-change: [all]
  openspec-archive-change: [all]
  openspec-explore: [all]
  openspec-propose: [all]
  openspec-sync-specs: [all]
  skill-writer: [all]
  gpt-model-selection: [all]
  qmd: [all]
  openai-docs: [all]
  claude-code-docs: [opencode]
mcp:
  context7:
    targets: [opencode, claude-code]
    enabled: true
  qmd:
    targets: [opencode, claude-code]
    enabled: false
  fff:
    targets: [opencode, claude-code]
    enabled: true
  deepwiki:
    targets: [opencode, claude-code]
    enabled: true
  openai-docs:
    targets: [opencode, claude-code]
    enabled: false
opencode:
  config:
    lsp: true
    reference:
      opencode: https://github.com/anomalyco/opencode
  plugins:
    - mindframe-z-example
  commands:
    - opsx-archive
    - opsx-apply
    - opsx-explore
    - opsx-propose
    - rmslop
