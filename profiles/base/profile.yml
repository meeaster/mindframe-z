name: base
description: Shared base config for all profiles.
targets:
  - opencode
  - claude-code
instructions:
  - shared/AGENTS.global.md
references:
  - opencode
  - openspec
  - mise
  - hunk
  - vercel-skills
  - agent-vault
skills:
  - hunk-review
  - impeccable
  - mise
  - opencode-db
  - openspec-apply-change
  - openspec-archive-change
  - openspec-explore
  - openspec-propose
  - openspec-sync-specs
  - skill-writer
  - gpt-model-selection
  - qmd
  - openai-docs
mcp:
  context7:
    enabled: true
  qmd:
    enabled: false
  fff:
    enabled: true
  deepwiki:
    enabled: true
  openai-docs:
    enabled: false
opencode:
  config:
    lsp: true
    reference:
      opencode: https://github.com/anomalyco/opencode
  plugins:
    - mindframe-z-example
  commands:
    - opsx-archive
    - opsx-apply
    - opsx-explore
    - opsx-propose
    - rmslop
