name: base
description: Shared base config for all profiles.
instructions:
  - shared/AGENTS.global.md
references:
  - opencode
  - openspec
  - mise
  - hunk
  - vercel-skills
  - agent-vault
  - ponytail
  - ccstatusline
  - just-bash
  - executor
  - mattpocock-skills
  - dd-apm-test-agent
  - sideshow
  - codex
thread:
  destinations:
    - name: testing
      remote: git@github.com:meeaster/thread-testing.git
  defaults:
    synthesize: claude-code:sonnet@max
    gather: claude-code:haiku@low
    discover: claude-code:haiku@low
    session_sources:
      - claude-code
      - opencode
skills:
  agent-browser:
    agents: { opencode: true, claude-code: true, codex: true }
  hunk-review:
    agents: { opencode: false, claude-code: false, codex: false }
  thermo-nuclear-code-quality-review:
    agents: { opencode: true, claude-code: true, codex: true }
  adversarial-code-review:
    agents: { opencode: true, claude-code: true, codex: true }
  quality-garden:
    agents: { opencode: true, claude-code: true, codex: true }
  impeccable:
    agents: { opencode: false, claude-code: false, codex: false }
  mise:
    agents: { opencode: false, claude-code: false, codex: false }
  agent-sessions:
    agents: { opencode: true, claude-code: true, codex: true }
  threads:
    agents: { opencode: true, claude-code: true, codex: true }
  openspec-apply-change:
    agents: { opencode: true, claude-code: true, codex: true }
    toggleable: false
  openspec-archive-change:
    agents: { opencode: true, claude-code: true, codex: true }
    toggleable: false
  openspec-explore:
    agents: { opencode: true, claude-code: true, codex: true }
    toggleable: false
  openspec-propose:
    agents: { opencode: true, claude-code: true, codex: true }
    toggleable: false
  openspec-sync-specs:
    agents: { opencode: true, claude-code: true, codex: true }
    toggleable: false
  openspec-verify-change:
    agents: { opencode: true, claude-code: true, codex: true }
    toggleable: false
  skill-writer:
    agents: { opencode: false, claude-code: false, codex: false }
  writing-great-skills:
    agents: { opencode: true, claude-code: true, codex: true }
  skill-patterns:
    agents: { opencode: true, claude-code: true, codex: true }
  audit-ai-writing:
    agents: { opencode: true, claude-code: true, codex: true }
  grill-with-docs:
    agents: { opencode: false, claude-code: false, codex: false }
  grill-me:
    agents: { opencode: false, claude-code: false, codex: false }
  grilling:
    agents: { opencode: false, claude-code: false, codex: false }
  to-prd:
    agents: { opencode: true, claude-code: true, codex: true }
  improve-codebase-architecture:
    agents: { opencode: false, claude-code: false, codex: false }
  domain-modeling:
    agents: { opencode: false, claude-code: false, codex: false }
  qmd:
    agents: { opencode: false, claude-code: false, codex: false }
  openai-docs:
    agents: { opencode: true, claude-code: true, codex: true }
  improve:
    agents: { opencode: true, claude-code: true, codex: true }
  claude-code-docs:
    agents: { opencode: true, claude-code: true, codex: true }
  build-mcp-server:
    agents: { opencode: true, claude-code: true, codex: true }
  xlsx:
    agents: { opencode: true, claude-code: true, codex: true }
  skill-creator:
    agents: { opencode: false, claude-code: false, codex: false }
  prototype:
    agents: { opencode: true, claude-code: true, codex: true }
  handoff:
    agents: { opencode: true, claude-code: true, codex: true }
  pr-writer:
    agents: { opencode: true, claude-code: true, codex: true }
mcp:
  context7:
    agents: { opencode: true, claude-code: true, codex: true }
  qmd:
    agents: { opencode: false, claude-code: true, codex: false }
  fff:
    agents: { opencode: true, claude-code: true, codex: true }
  deepwiki:
    agents: { opencode: true, claude-code: true, codex: true }
  openai-docs:
    agents: { opencode: false, claude-code: true, codex: false }
  exa:
    agents: { claude-code: true }
opencode:
  config:
    lsp: true
    tools:
      websearch: true
    reference:
      opencode: https://github.com/anomalyco/opencode
    permission:
      read:
        "~/.aws/**": deny
      bash:
        "*": ask
        "*/.aws/*": deny
        "*EXA_API_KEY*": deny
        "*GITHUB_TOKEN*": deny
        "*GH_TOKEN*": deny
  plugins:
    - advisor
    - agent-task
    - mindframe-z-example
  commands:
    - apply-spec
    - rmslop
  agents:
    - research
codex:
  config:
    tui:
      status_line:
        - model-with-reasoning
        - current-dir
        - git-branch
        - context-used
        - permissions
        - approval-mode
      status_line_use_colors: true
      theme: dracula
  plugins:
    "github@openai-curated":
      enabled: true
claude:
  settings:
    statusLine:
      type: command
      command: ccstatusline
      padding: 0
      refreshInterval: 10
    attribution:
      commit: ""
      pr: ""

extra_folders:
  - path: ~/.mindframe-z
    description: mindframe-z configuration and generated indexes — needed when looking up references, reading machine config, or inspecting extra folder permissions
  - path: ~/.agent/diagrams
    description: Agent diagram files and exports — needed for reviewing and updating local workflow diagrams
  - path: ~/.claude/threads
    description: Thread-log archives — per-thread session extractions, state digests, and logs for multi-session work; needed when resuming or reviewing past threads
