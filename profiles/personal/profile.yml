name: personal
extends: base
description: Personal AI setup with Home Assistant and DeepSeek models.
thread:
  destinations:
    - name: personal
      remote: git@github.com:meeaster/threads.git
      default: true
agents: [opencode, claude-code]
references:
  - clack
  - ha-mcp
skills:
  home-assistant-best-practices:
    enabled: false
mcp:
  homeassistant:
    enabled: false
  openai-docs:
    enabled: false
  pinescript-docs:
    enabled: false
  aws-knowledge:
    enabled: false
  x-docs:
    enabled: false
  exa-research:
    enabled: false
opencode:
  config:
    permission:
      read:
        "~/.xurl": deny
      edit:
        "~/.xurl": deny
      bash:
        "*": allow
    agent:
      explore:
        model: opencode-go/deepseek-v4-flash
        reasoningEffort: max
      compaction:
        model: opencode-go/deepseek-v4-flash
        reasoningEffort: max
  agent_task:
    models:
      - name: gpt-5.4-mini
        variants: [low, medium, high, xhigh]
        default_variant: high
        providers: [openai/gpt-5.4-mini]
      - name: gpt-5.5
        variants: [low, medium, high]
        default_variant: medium
        providers: [openai/gpt-5.5]
      - name: deepseek-v4-flash
        variants: [max]
        default_variant: max
        providers: [opencode-go/deepseek-v4-flash]
      - name: glm-5.2
        providers: [opencode-go/glm-5.2]
    agents:
      - name: general
        model: glm-5.2
      - name: explore
        model: deepseek-v4-flash
        variant: max
