name: personal
extends: base
description: Personal AI setup with Home Assistant and DeepSeek models.
agents: [opencode]
skills:
  home-assistant-best-practices:
  homeassistant:
mcp:
  homeassistant:
    enabled: false
  openai-docs:
    enabled: false
  pinescript-docs:
    enabled: false
  aws-knowledge:
    enabled: false
opencode:
  config:
    skills:
      urls:
        - https://docs.x.com/.well-known/skills/
    agent:
      explore:
        model: opencode-go/deepseek-v4-flash
        reasoningEffort: medium
