name: personal
extends: base
description: Personal AI setup with Home Assistant and DeepSeek models.
agents: [opencode]
references:
  - clack
  - ha-mcp
skills:
  home-assistant-best-practices:
    enabled: false
mcp:
  homeassistant:
    enabled: false
  openai-docs:
    enabled: false
  pinescript-docs:
    enabled: false
  aws-knowledge:
    enabled: false
opencode:
  config:
    agent:
      explore:
        model: opencode-go/deepseek-v4-flash
        reasoningEffort: medium
      compaction:
        model: opencode-go/deepseek-v4-flash
