name: personal
extends: base
description: Personal AI setup with Home Assistant and DeepSeek models.
skills:
  home-assistant-best-practices: [opencode]
  homeassistant: [opencode]
mcp:
  homeassistant:
    targets: [opencode]
    enabled: false
  openai-docs:
    targets: [opencode]
    enabled: false
  pinescript-docs:
    targets: [opencode]
    enabled: false
  aws-knowledge:
    targets: [opencode]
    enabled: false
opencode:
  config:
    skills:
      urls:
        - https://docs.x.com/.well-known/skills/
    agent:
      explore:
        model: opencode-go/deepseek-v4-flash
        reasoningEffort: medium
claude:
  model: sonnet
  settings:
    includeGitInstructions: true
