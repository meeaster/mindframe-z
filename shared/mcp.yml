servers:
  context7:
    description: Documentation lookup MCP.
    type: remote
    transport: http
    url: https://mcp.context7.com/mcp
  qmd:
    description: Local markdown knowledge base MCP.
    type: local
    command: [qmd, mcp]
  fff:
    description: Local fast file finder MCP.
    type: local
    command: [fff-mcp]
  deepwiki:
    description: Repository documentation and implementation detail MCP.
    type: remote
    transport: http
    url: https://mcp.deepwiki.com/mcp
  openai-docs:
    description: OpenAI developer documentation MCP server.
    type: remote
    transport: http
    url: https://developers.openai.com/mcp
  pinescript-docs:
    description: Pine Script documentation MCP server.
    type: local
    command: [npx, -y, pinescript-mcp-server]
  aws-knowledge:
    description: AWS knowledge MCP server.
    type: remote
    transport: http
    url: https://knowledge-mcp.global.api.aws
  jira:
    description: Jira MCP server.
    type: remote
    transport: http
    url: https://mcp.atlassian.com/v1/mcp
  confluence:
    description: Confluence MCP server.
    type: remote
    transport: http
    url: https://mcp.atlassian.com/v1/mcp
  datadog:
    description: Datadog MCP server.
    type: remote
    transport: http
    url: https://mcp.datadoghq.com/api/unstable/mcp-server/mcp
  homeassistant:
    description: Home Assistant MCP server (ha-mcp-web).
    type: remote
    transport: http
    url: http://192.168.30.39:9583/{env:HA_MCP_SECRET_PATH}
  x-docs:
    description: X API documentation search MCP server (hosted).
    type: remote
    transport: http
    url: https://docs.x.com/mcp
  exa:
    description: Exa AI web search MCP server (web_search_exa, web_fetch_exa).
    type: remote
    transport: http
    url: https://mcp.exa.ai/mcp
    headers:
      x-api-key: "{env:EXA_API_KEY}"
  exa-research:
    description: Exa AI web search MCP server including web_search_advanced_exa tool.
    type: remote
    transport: http
    url: https://mcp.exa.ai/mcp?tools=web_search_advanced_exa
    headers:
      x-api-key: "{env:EXA_API_KEY}"
