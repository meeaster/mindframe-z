references:
  - name: opencode
    url: https://github.com/anomalyco/opencode.git
    description: "TypeScript/Bun monorepo for the open-source AI coding agent (terminal, desktop, VS Code extension). Main CLI entrypoint at packages/opencode/src/index.ts. Supports MCP, custom tools, file editing, and agentic workflows."
  - name: openspec
    url: https://github.com/Fission-AI/OpenSpec.git
    description: "TypeScript spec-driven development framework (npm @fission-ai/openspec) for collaboratively authoring software specifications, change proposals, and implementation plans. Defines spec schema, CLI commands (/opsx:propose, /opsx:apply), and workflow conventions for spec-first development under openspec/changes/."
  - name: mise
    url: https://github.com/jdx/mise.git
    description: "Rust-based CLI (github.com/jdx/mise) combining dev tool version management, per-project environment variables, and task running into a single mise.toml. Installs and switches between hundreds of tools (node, python, terraform, etc.) without shims."
  - name: hunk
    url: https://github.com/modem-dev/hunk.git
    description: "TypeScript terminal diff viewer (npm hunkdiff) for browsing agent-authored changesets. Multi-file diff review TUI with sidebar navigation, inline AI annotations, split/stack layouts, watch mode, and Git/Jujutsu/raw patch support. Entrypoint: bin/hunk.cjs."
  - name: vercel-skills
    url: https://github.com/vercel-labs/skills.git
    description: "TypeScript CLI for the open ecosystem manager of AI coding agent skills. Installs, lists, finds, updates, and removes reusable SKILL.md instruction sets across 50+ agents (OpenCode, Claude Code, Codex, Cursor, etc.) from Git repos or local paths, with project-level or global scoping."
  - name: agent-vault
    url: https://github.com/Infisical/agent-vault.git
    description: "Go-based open-source HTTP credential proxy/vault (by Infisical) that sits between AI agents and APIs to eliminate credential exfiltration risk. Stores credentials server-side; MITM proxy on port 14322 injects them via HTTPS_PROXY. Management API/UI on port 14321."
  - name: just-bash
    url: https://github.com/vercel-labs/just-bash.git
    description: "TypeScript virtual bash environment with an in-memory filesystem for AI agents. Provides a sandboxed shell with broad unix command support and optional curl, Python, JS/TS, and sqlite capabilities."
  - name: executor
    url: https://github.com/rhyssullivan/executor.git
    description: "TypeScript integration layer for AI agents that catalogs tools across OpenAPI, GraphQL, MCP, Google Discovery, and custom JSON-schema-based integrations."
  - name: datadog-agent
    url: https://github.com/datadog/datadog-agent.git
    description: Go/Bazel monorepo for the Datadog Agent v6 and v7, including the agent runtime, component bundles, packaging, and developer docs. Main developer docs live under docs/dev and comp/README.md lists component packages and their pkg.go.dev entrypoints
  - name: integrations-core
    url: https://github.com/DataDog/integrations-core.git
    description: Python monorepo for Datadog Agent integrations and the shared framework/tooling around them. The ddev CLI is the main entrypoint for testing, validation, and release workflows, and datadog_checks_base/datadog_checks_dev provide the core integration framework. Individual integrations live in their own directories with pyproject.toml, manifest.json, and datadog_checks/<name>/ packages
  - name: datadog-documentation
    url: https://github.com/DataDog/documentation.git
    description: Hugo-based documentation site for Datadog, publishing the markdown in content/ to docs.datadoghq.com. The repo includes generated API docs under content/*/api, site data and partials under data/, and build scripts in package.json for local preview, checks, and deployment
  - name: pup
    url: https://github.com/DataDog/pup.git
    description: "Rust-based CLI companion for Datadog observability with 200+ commands across many product areas. Main entrypoints include the `pup` CLI, `docs/COMMANDS.md`, `docs/OAUTH2.md`, and `docs/EXAMPLES.md`; the repo also ships agent skills, agents, and plugin manifests under `.agents/`, `.claude-plugin/`, `.codex-plugin/`, and `skills/`."
  - name: clack
    url: https://github.com/bombshell-dev/clack.git
    description: "TypeScript pnpm monorepo for building stylish, interactive CLI prompts. Two main packages: @clack/prompts (ready-to-use components: text inputs, selects, spinners, multiselects) and @clack/core (headless primitives for custom prompts)."
  - name: ha-mcp
    url: https://github.com/homeassistant-ai/ha-mcp.git
    description: "Python project (>=3.13, FastMCP-based) providing a Model Context Protocol interface for AI assistants to control Home Assistant. Exposes 89+ MCP tools for querying device states, executing services, and managing automations via natural language. Connects via Home Assistant WebSocket API with a Long-Lived Access Token."
  - name: ponytail
    url: https://github.com/DietrichGebert/ponytail.git
    description: "JavaScript plugin and skills for AI agents (Claude Code, Codex, OpenCode, Gemini, Pi, Copilot) that enforces a YAGNI minimum-code ruleset via an always-on ladder (YAGNI -> stdlib -> native -> installed dep -> one line -> minimum). Main entrypoints are the OpenCode plugin at .opencode/plugins/ponytail.mjs, the rules in AGENTS.md, and the commands under commands/ (lite/full/ultra/off, review, audit, debt). Deferred shortcuts are marked inline with a `ponytail:` comment naming the upgrade path"
  - name: mattpocock-skills
    url: https://github.com/mattpocock/skills.git
    description: "Shell/markdown collection of composable AI coding agent skills by Matt Pocock (grill-me, grill-with-docs, tdd, diagnosing-bugs, triage, to-prd, improve-codebase-architecture, and more). Entrypoints under skills/engineering/, skills/productivity/, and skills/misc/. Installable via npx skills@latest add mattpocock/skills"
  - name: ccstatusline
    url: https://github.com/sirmalloc/ccstatusline.git
    description: "TypeScript/Bun project for a highly customizable status line formatter for Claude Code CLI with Powerline support, themes, and 80+ widgets (model info, git branch, token usage, context, timers, usage limits, and more). Main entrypoints: src/ for the React/Ink TUI, and the ccstatusline CLI command."
  - name: dd-apm-test-agent
    url: https://github.com/DataDog/dd-apm-test-agent.git
    description: "Python DataDog APM test agent (aka lapdog) that acts as an observability proxy for AI coding agents. Captures hook events, LLM cost spans, and per-source hook APIs (Claude/Codex/Pi) for dashboard rendering. Key entrypoints: ddapm_test_agent/agent.py (CLI flags: --lapdog-mode, --web-ui-port), ddapm_test_agent/claude_hooks.py (/claude/hooks handler), plugins/lapdog/hooks/hooks.json (Claude Code hook plugin), lapdog/cli.py (liveness probe), lapdog/pi_lapdog_extension.ts (LAPDOG_URL env override)."
  - name: sideshow
    url: https://github.com/modem-dev/sideshow.git
    description: "TypeScript live visual surface for terminal coding agents. Publishes browser-rendered surfaces for diagrams, UI sketches, markdown, diffs, terminal output, images, Mermaid, JSON, and code; see README.md and docs/connecting-agents.md for CLI, MCP, HTTP, and agent integration details."
