skills:
  - name: home-assistant-best-practices
    source: git
    repo: https://github.com/homeassistant-ai/skills
    skill: home-assistant-best-practices
    description: >
      Best practices for HA automations, helpers, scripts, device controls, and dashboards. Use when creating/editing
      automations, scripts, scenes, dashboards, helpers, Zigbee button/remote automations, entity renames, or Home
      Assistant dashboard cards.
    targets:
      - opencode
  - name: homeassistant
    source: local
    skill: homeassistant
    description: >
      Use when inspecting, scripting, testing, or troubleshooting Home Assistant through CLI-accessible HTTP or
      WebSocket APIs, including curl, inline Python with uv, authentication, service calls, events, entity registry
      work, or voice-assistant exposure.
    targets:
      - opencode
  - name: gpt-5-5-prompting
    source: local
    skill: gpt-5-5-prompting
    description: >
      Use when creating, reviewing, migrating, or tightening prompts for GPT-5.5, especially outcome-first goals,
      concise style controls, retrieval budgets, preambles, phase handling, validation loops, or prompt structure.
    targets:
      - opencode
  - name: impeccable
    source: git
    repo: https://github.com/pbakaus/impeccable
    skill: impeccable
    description: >
      Use when designing, redesigning, shaping, critiquing, auditing, polishing, clarifying, hardening, optimizing,
      adapting, animating, colorizing, extracting, or otherwise improving a frontend interface.
    targets:
      - opencode
  - name: jira-writer
    source: local
    skill: jira-writer
    description: >
      Create clear, high-level Jira stories from notes, requirements, discovery, bug reports, or implementation ideas.
      Use when drafting a Jira story, creating a Jira ticket, turning rough notes into Jira-ready work, or rewriting a
      story so it is concise and actionable.
    targets:
      - opencode
  - name: mise
    source: local
    skill: mise
    description: >
      Use when answering mise basics: installing or adding global tools, choosing a mise backend, managing global mise
      environment variables, checking mise config, or giving concise mise command guidance.
    targets:
      - opencode
  - name: opencode-db
    source: local
    skill: opencode-db
    description: >
      Use when safely inspecting or querying OpenCode's local database with `opencode db`, including sessions, messages,
      projects, workspaces, tool calls, skill/MCP usage, subagents, or prior assistant behavior.
    targets:
      - opencode
  - name: skill-writer
    source: git
    repo: https://github.com/getsentry/skills
    skill: skill-writer
    description: >
      Create, synthesize, and iteratively improve agent skills following the Agent Skills specification. Use when asked
      to create, write, synthesize, improve, update, or maintain skill docs and registration.
    targets:
      - opencode
  - name: hunk-review
    source: git
    repo: https://github.com/modem-dev/hunk
    skill: hunk-review
    description:
      Interacts with live Hunk diff review sessions via CLI. Inspects review focus, navigates files and hunks,
      reloads session contents, and adds inline review comments. Use when the user has a Hunk session running or wants
      to review diffs interactively.
    targets:
      - opencode
    installer: npx-skills
  - name: openspec-apply-change
    source: local
    skill: openspec-apply-change
    description: >
      Implement tasks from an OpenSpec change. Use when starting implementation, continuing implementation,
      or working through tasks.
    targets:
      - opencode
  - name: openspec-archive-change
    source: local
    skill: openspec-archive-change
    description: >
      Archive a completed change in the experimental workflow. Use when finalizing and archiving a change
      after implementation is complete.
    targets:
      - opencode
  - name: openspec-explore
    source: local
    skill: openspec-explore
    description: >
      Enter explore mode — a thinking partner for exploring ideas, investigating problems, and clarifying
      requirements. Use when thinking through something before or during a change.
    targets:
      - opencode
  - name: openspec-propose
    source: local
    skill: openspec-propose
    description: >
      Propose a new change with all artifacts generated in one step. Use when quickly describing what to build
      and getting a complete proposal with design, specs, and tasks ready for implementation.
    targets:
      - opencode
  - name: openspec-sync-specs
    source: local
    skill: openspec-sync-specs
    description: >
      Sync delta specs from a change to main specs. Use when updating main specs with changes from a delta spec,
      without archiving the change.
    targets:
      - opencode
