skills:
  - name: grill-with-docs
    source: git
    repo: https://github.com/mattpocock/skills
    skill: grill-with-docs
    description: >
      Grill a codebase with questions about how something works, finding related code, or
      identifying patterns and anti-patterns in a codebase.
  - name: grill-me
    source: git
    repo: https://github.com/mattpocock/skills
    skill: grill-me
    description: >
      Relentless interviewing skill that stress-tests plans and designs through systematic
      questioning.
  - name: grilling
    source: git
    repo: https://github.com/mattpocock/skills
    skill: grilling
    description: >
      Interview me relentlessly about every aspect of this plan until we reach a shared
      understanding. Walk down each branch of the design tree, resolving dependencies between
      decisions one-by-one. For each question, provide your recommended answer.
  - name: improve-codebase-architecture
    source: git
    repo: https://github.com/mattpocock/skills
    skill: improve-codebase-architecture
    description: >
      Analyze a codebase architecture and suggest improvements, refactors, and structural changes
      to improve maintainability, performance, and code quality.
  - name: domain-modeling
    source: git
    repo: https://github.com/mattpocock/skills
    skill: domain-modeling
    description: >
      Actively build and sharpen the project's domain model as you design.
  - name: home-assistant-best-practices
    source: git
    repo: https://github.com/homeassistant-ai/skills
    skill: home-assistant-best-practices
    description: >
      Best practices for HA automations, helpers, scripts, device controls, and dashboards. Use when creating/editing
      automations, scripts, scenes, dashboards, helpers, Zigbee button/remote automations, entity renames, or Home
      Assistant dashboard cards.
  - name: homeassistant
    source: local
    skill: homeassistant
    description: >
      Use when inspecting, scripting, testing, or troubleshooting Home Assistant through CLI-accessible HTTP or
      WebSocket APIs, including curl, inline Python with uv, authentication, service calls, events, entity registry
      work, or voice-assistant exposure.
  - name: gpt-model-selection
    source: local
    skill: gpt-model-selection
    description: >
      Use when choosing which GPT model or reasoning effort to use, or when creating, reviewing, migrating, or tightening
      prompts for GPT-5.5, GPT-5.4, GPT-5.4-mini, or GPT-5.3 Codex.
  - name: impeccable
    source: git
    repo: https://github.com/pbakaus/impeccable
    skill: impeccable
    description: >
      Use when designing, redesigning, shaping, critiquing, auditing, polishing, clarifying, hardening, optimizing,
      adapting, animating, colorizing, extracting, or otherwise improving a frontend interface.
  - name: confluence-writer
    source: local
    skill: confluence-writer
    description: >
      Draft, refine, and sync Confluence pages as local markdown, then publish to Confluence on approval. Use when
      asked to write or update a Confluence page, turn a design or thread into a shareable doc, or publish a page for
      the team to read.
  - name: jira-writer
    source: local
    skill: jira-writer
    description: >
      Draft, refine, and sync Jira stories as local markdown, then push to Jira on approval. Use when asked to write
      or update a Jira story, turn notes or a bug into a ticket, or rewrite a story to read clearly.
  - name: mise
    source: local
    skill: mise
    description: >
      Use when answering mise basics: installing or adding global tools, choosing a mise backend, managing global mise
      environment variables, checking mise config, or giving concise mise command guidance.
  - name: opencode-sessions
    source: local
    skill: opencode-sessions
    description: >
      Use when reading or analyzing OpenCode sessions — finding a past session, tracing its tool calls or subagents,
      reconstructing what happened — or otherwise querying OpenCode's local SQLite database (`opencode db`) for messages,
      projects, or todos.
  - name: thread-log
    source: local
    skill: thread-log
    description: >
      Hand-orchestrated thread-log workflow — read, create, or update a thread-log via subagents directly,
      the pre-CLI path kept working alongside the `mfz thread` system. User-invoked.
  - name: threads
    source: local
    skill: threads
    description: >
      Operate threads with the `mfz thread` CLI — load a thread's digest into context, or build and refresh
      one by discovering and ingesting sessions. Use when the user references an existing thread, wants to
      resume or catch up on prior multi-session work, or wants to ingest sessions into a thread.
  - name: thread-contract
    source: local
    skill: thread-contract
    description: >
      The artifact contract for thread synthesis — the bucket taxonomy, citation form, and the exact shape
      of a thread session file and of the current-state digest. Use when writing a thread session file from
      a dossier or regenerating a thread digest from session files.
  - name: skill-writer
    source: git
    repo: https://github.com/getsentry/skills
    skill: skill-writer
    description: >
      Create, synthesize, and iteratively improve agent skills following the Agent Skills specification. Use when asked
      to create, write, synthesize, improve, update, or maintain skill docs and registration.
  - name: writing-great-skills
    source: git
    repo: https://github.com/mattpocock/skills
    skill: writing-great-skills
    description: >
      Reference for writing and editing skills well — the vocabulary and principles that make a skill predictable.
      Use when creating, editing, or pruning a skill, diagnosing why a skill feels verbose or ineffective, or deciding
      how to structure skill content.
  - name: hunk-review
    source: git
    repo: https://github.com/modem-dev/hunk
    skill: hunk-review
    description:
      Interacts with live Hunk diff review sessions via CLI. Inspects review focus, navigates files and hunks,
      reloads session contents, and adds inline review comments. Use when the user has a Hunk session running or wants
      to review diffs interactively.
    installer: skills
  - name: thermo-nuclear-code-quality-review
    source: git
    repo: https://github.com/cursor/plugins
    skill: thermo-nuclear-code-quality-review
    description: >
      Run an extremely strict maintainability review for abstraction quality, giant files, and spaghetti-condition
      growth. Use for a thermo-nuclear code quality review, thermonuclear review, deep code quality audit, or
      especially harsh maintainability review.
    installer: skills
  - name: openspec-apply-change
    source: local
    skill: openspec-apply-change
    description: >
      Implement tasks from an OpenSpec change. Use when starting implementation, continuing implementation, or working
      through tasks.
  - name: openspec-archive-change
    source: local
    skill: openspec-archive-change
    description: >
      Archive a completed change in the experimental workflow. Use when finalizing and archiving a change after
      implementation is complete.
  - name: openspec-explore
    source: local
    skill: openspec-explore
    description: >
      Enter explore mode — a thinking partner for exploring ideas, investigating problems, and clarifying requirements.
      Use when thinking through something before or during a change.
  - name: openspec-propose
    source: local
    skill: openspec-propose
    description: >
      Propose a new change with all artifacts generated in one step. Use when quickly describing what to build and
      getting a complete proposal with design, specs, and tasks ready for implementation.
  - name: openspec-sync-specs
    source: local
    skill: openspec-sync-specs
    description: >
      Sync delta specs from a change to main specs. Use when updating main specs with changes from a delta spec, without
      archiving the change.
  - name: openspec-verify-change
    source: local
    skill: openspec-verify-change
    description: >
      Verify a change is ready for implementation. Use when checking if all required artifacts are complete and the
      change can proceed to implementation.
  - name: pr-writer
    source: local
    skill: pr-writer
    description: >
      Write or refresh a GitHub PR title and description, then create or update the PR with gh on approval. Use when
      opening a PR, writing or rewriting a PR title/body, or refreshing one after the branch changed.
  - name: qmd
    source: git
    repo: https://github.com/tobi/qmd
    skill: qmd
    description:
      Search markdown knowledge bases, notes, and documentation using QMD. Use when users ask to search notes,
      find documents, or look up information.
    installer: skills
  - name: visual-explainer
    source: git
    repo: https://github.com/nicobailon/visual-explainer
    skill: visual-explainer
    description:
      Generate beautiful, self-contained HTML pages that visually explain systems, code changes, plans, and data.
      Use when the user asks for a diagram, architecture overview, diff review, plan review, project recap, comparison
      table, or any visual explanation of technical concepts. Also use proactively when you are about to render a
      complex ASCII table (4+ rows or 3+ columns) — present it as a styled HTML page instead.
    installer: skills
  - name: openai-docs
    source: git
    repo: https://github.com/openai/skills
    skill: openai-docs
    description:
      Use when the user asks how to build with OpenAI products or APIs and needs up-to-date official
      documentation with citations, help choosing the latest model for a use case, or model upgrade and prompt-upgrade
      guidance; prioritize OpenAI docs MCP tools, use bundled references only as helper context, and restrict any
      fallback browsing to official OpenAI domains.
    installer: skills
  - name: improve
    source: git
    repo: https://github.com/shadcn/improve
    skill: improve
    description: >
      Audit a codebase and write self-contained implementation plans for cheaper models to execute. Uses your most
      capable model for understanding, judging, and specifying — then hands off execution. Use for full audits,
      quick hotspot scans, focused category audits, branch-scoped PR reviews, or generating actionable specs.
    installer: skills
  - name: audit-ai-writing
    source: local
    skill: audit-ai-writing
    description: >
      Audits prose for the tells of AI-generated writing — puffery, weasel attributions,
      negative parallelisms, the rule of three, AI vocabulary, and formatting tics. Use when
      asked to review or audit writing for AI signs, de-slop a draft, or strip ChatGPT-isms.
  - name: agent-browser
    source: git
    repo: https://github.com/vercel-labs/agent-browser
    skill: agent-browser
    description: >
      Fast browser automation CLI for AI agents with accessibility-tree snapshots,
      Chrome profile reuse, session persistence, and compact @eN element refs.
      Use when automating browser interactions, extracting data, filling forms,
      or testing web pages.
  - name: claude-code-docs
    source: local
    skill: claude-code-docs
    description: >
      Navigate and fetch Claude Code documentation. Use when answering questions about Claude Code features,
      configuration, capabilities, hooks, plugins, MCP servers, settings, CLI usage, deployment options, or
      troubleshooting.
  - name: claude-code-sessions
    source: local
    skill: claude-code-sessions
    description: >
      Use when reading or analyzing Claude Code sessions (Claude sessions) — finding a past session by prompt, project,
      or recency, tracing its tool calls, subagents, or permission events, or reconstructing what happened — from the
      local session files under `~/.claude`.
  - name: build-mcp-server
    source: git
    repo: https://github.com/anthropics/claude-plugins-official
    skill: build-mcp-server
    description: >
      Design and build MCP servers for Claude. Use when the user asks to build an MCP server, create an MCP
      integration, wrap an API for Claude, expose tools to Claude, or choose between remote HTTP, MCPB, and local
      stdio deployment models.
    installer: skills
  - name: xlsx
    source: git
    repo: https://github.com/anthropics/skills
    skill: xlsx
    description: >
      Read, analyze, and create Excel (.xlsx) spreadsheets using Python and openpyxl. Use when the user asks
      to inspect spreadsheet data, create/update Excel files, analyze tabular data, convert CSV to XLSX, or
      work with Excel workbooks programmatically in Python.
    installer: skills
  - name: prototype
    source: git
    repo: https://github.com/mattpocock/skills
    skill: prototype
    description: >
      Build a throwaway prototype to flesh out a design — a runnable terminal app for
      state/business-logic questions, or several radically different UI variations toggleable
      from one route. Use when exploring a design through executable code before committing
      to an implementation.
    installer: skills
  - name: handoff
    source: git
    repo: https://github.com/mattpocock/skills
    skill: handoff
    description: >
      Summarize conversations into handoff documents for seamless agent-to-agent transitions.
      Use when wrapping up a session and wanting to create a structured summary for a fresh
      agent to continue the work.
