# Machine-local AI config. Place this at ~/.mindframe-z/config.yml.
# Overrides the profile selection, references directory, and machine-specific
# OpenCode overrides for this machine.
# This file is not checked into the repo — it's per-machine config.
profile: personal
repo_path: ~/code/mindframe-z
references_dir: ~/references

